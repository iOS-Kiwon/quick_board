name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable

      - name: Install dependencies (skulking)
        run: flutter pub get
        working-directory: quick-board-flutter/apps/skulking

      - name: Install dependencies (yacht)
        run: flutter pub get
        working-directory: quick-board-flutter/apps/yacht

      - name: Build skulking
        run: flutter build web --base-href /games/skulking/
        working-directory: quick-board-flutter/apps/skulking

      - name: Build yacht
        run: flutter build web --base-href /games/yacht/
        working-directory: quick-board-flutter/apps/yacht

      - name: Assemble site
        run: |
          mkdir -p _site/games/skulking
          mkdir -p _site/games/yacht
          cp sitemap.xml _site/sitemap.xml
          cp robots.txt _site/robots.txt
          cp -r support _site/support
          cp -r quick-board-flutter/apps/skulking/build/web/. _site/games/skulking/
          cp -r quick-board-flutter/apps/yacht/build/web/. _site/games/yacht/

          # CanvasKit 엔진 리비전 추출
          ENGINE_REV=$(grep -o '"engineRevision":"[^"]*"' quick-board-flutter/apps/skulking/build/web/flutter_bootstrap.js | head -1 | sed 's/"engineRevision":"//;s/"//')
          CANVASKIT_BASE="https://www.gstatic.com/flutter-canvaskit/${ENGINE_REV}"

          # index.html에 prefetch 태그 삽입
          sed "s|</head>|  <link rel=\"prefetch\" href=\"/games/skulking/main.dart.js\" as=\"script\">\n  <link rel=\"prefetch\" href=\"/games/yacht/main.dart.js\" as=\"script\">\n  <link rel=\"prefetch\" href=\"${CANVASKIT_BASE}/canvaskit.js\" as=\"script\">\n  <link rel=\"prefetch\" href=\"${CANVASKIT_BASE}/canvaskit.wasm\" as=\"fetch\" crossorigin>\n</head>|" index.html > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
